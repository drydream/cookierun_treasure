<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Treasure editor</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 20px auto; padding: 0 16px; }
  .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
  #search { flex: 1; min-width: 160px; font-size: 15px; padding: 6px; }
  #summary { color: #666; font-size: 14px; white-space: nowrap; }

  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #eee; vertical-align: middle; }
  tr:hover { background: #faf6ee; }
  td.thumb img { width: 40px; height: 40px; object-fit: contain; background: #f2eadf; border-radius: 6px; }
  td.effect { max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #555; font-size: 13px; }
  td.effect.empty { color: #bbb; font-style: italic; }
  .krname { color: #888; font-size: 12px; }
  .yes { color: #2e8b2e; }
  .no { color: #bbb; }
  td.actions button { font-size: 13px; padding: 4px 10px; cursor: pointer; }
  .src-line { color: #3a6b8a; }
  .src-kr { color: #b8860b; }

  #editView img { width: 80px; height: 80px; object-fit: contain; background: #f2eadf; border-radius: 8px; }
  .card { display: flex; gap: 16px; align-items: flex-start; }
  label.field { display: block; font-size: 13px; color: #666; margin: 10px 0 2px; }
  #nameInput { width: 100%; font-size: 18px; font-weight: bold; box-sizing: border-box; }
  .grade { color: #b8860b; }
  .kr { white-space: pre-wrap; background: #f5f5f5; padding: 10px; border-radius: 6px; margin: 4px 0; }
  textarea { width: 100%; height: 100px; font-size: 15px; box-sizing: border-box; }
  button { font-size: 15px; padding: 8px 16px; margin-right: 8px; cursor: pointer; }
  #status { color: green; }
  #status.error { color: #c00; }
  .nav { margin-top: 10px; }

  #loginView { max-width: 320px; margin: 100px auto; text-align: center; }
  #loginView input { width: 100%; font-size: 15px; padding: 8px; box-sizing: border-box; margin-bottom: 10px; }
</style>
</head>
<body>

<div id="loginView">
  <p>Enter admin password</p>
  <input id="password" type="password">
  <button id="loginBtn">Enter</button>
  <div id="loginStatus" style="color:#c00"></div>
</div>

<div id="listView" style="display:none">
  <div class="top">
    <input id="search" placeholder="Search by name...">
    <label style="white-space:nowrap">source:
      <select id="sourceFilter">
        <option value="all">All</option>
        <option value="line">LINE</option>
        <option value="kr">Kakao/Global</option>
      </select>
    </label>
    <label style="white-space:nowrap"><input type="checkbox" id="onlyUntranslated"> only untranslated</label>
    <div id="summary"></div>
  </div>
  <table>
    <thead><tr><th></th><th>Name</th><th>Source</th><th>Grade</th><th>Effect text</th><th></th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<div id="editView" style="display:none">
  <button id="backToList">&larr; Back to list</button>
  <div class="card" style="margin-top:10px">
    <img id="img">
    <div style="flex:1">
      <input id="nameInput">
      <div class="grade" id="gradeInfo"></div>
      <div class="grade" id="krName"></div>
    </div>
  </div>
  <div id="krBlock" style="display:none">
    <label class="field">Korean ability text (reference)</label>
    <div class="kr" id="kr"></div>
  </div>
  <label class="field">Effect text</label>
  <textarea id="effectInput" placeholder="No effect text in source for this item"></textarea>
  <div class="nav">
    <button id="prev">&larr; Prev</button>
    <button id="save">Save</button>
    <button id="saveNext">Save &amp; Next</button>
    <button id="skip">Skip &rarr;</button>
    <span id="status"></span>
  </div>
</div>

<script>
let items = [];
let idx = 0;
let password = localStorage.getItem('adminPassword') || '';

function showApp() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('listView').style.display = 'block';
  Promise.all([
    fetch('/treasures.json').then(r => r.json()),
    fetch('/treasures-kr.json').then(r => r.json()),
  ]).then(([lineRaw, krRaw]) => {
    const lineItems = lineRaw.map(it => ({
      source: 'line',
      originalName: it.name,
      name: it.name,
      krName: '',
      grade: it.grade,
      category: it.section,
      effect: it.effect,
      krAbility: '',
      localImage: it.localImage,
    }));
    const krItems = krRaw.map(it => ({
      source: 'kr',
      id: it.id,
      name: it.englishName,
      krName: it.name,
      grade: it.grade,
      category: it.category,
      effect: it.abilityEn,
      krAbility: it.ability,
      localImage: it.localImage,
    }));
    items = [...lineItems, ...krItems];
    renderList();
  });
}

if (password) showApp();

document.getElementById('loginBtn').onclick = () => {
  password = document.getElementById('password').value;
  localStorage.setItem('adminPassword', password);
  showApp();
};

function filteredIndices() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const onlyUntranslated = document.getElementById('onlyUntranslated').checked;
  const sourceFilter = document.getElementById('sourceFilter').value;
  return items.map((it, i) => i).filter(i => {
    const it = items[i];
    if (sourceFilter !== 'all' && it.source !== sourceFilter) return false;
    if (onlyUntranslated && it.effect) return false;
    if (!q) return true;
    return it.name.toLowerCase().includes(q) || (it.krName || '').includes(q);
  });
}

function escapeHtml(s) {
  return s.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

function renderList() {
  const vis = filteredIndices();
  const translatedCount = items.filter(it => it.effect).length;
  const untranslatedCount = items.filter(it => !it.effect).length;
  document.getElementById('summary').textContent =
    `${vis.length} shown (of ${items.length}) · ${translatedCount} with text · ${untranslatedCount} without`;
  const rows = vis.map(i => {
    const it = items[i];
    const img = it.localImage ? '/' + it.localImage : '';
    const effectCell = it.effect
      ? `<td class="effect" title="${escapeHtml(it.effect)}">${escapeHtml(it.effect)}</td>`
      : `<td class="effect empty">(no effect text)</td>`;
    return `<tr>
      <td class="thumb"><img src="${img}" loading="lazy"></td>
      <td><div>${escapeHtml(it.name)}</div>${it.krName ? '<div class="krname">' + escapeHtml(it.krName) + '</div>' : ''}</td>
      <td class="src-${it.source}">${it.source === 'kr' ? 'Kakao/Global' : 'LINE'}</td>
      <td>${it.grade}</td>
      ${effectCell}
      <td class="actions"><button data-idx="${i}">Edit</button></td>
    </tr>`;
  }).join('');
  document.getElementById('rows').innerHTML = rows;
  document.getElementById('rows').querySelectorAll('button[data-idx]').forEach(btn => {
    btn.onclick = () => openEdit(parseInt(btn.dataset.idx));
  });
}

function openEdit(i) {
  idx = i;
  document.getElementById('listView').style.display = 'none';
  document.getElementById('editView').style.display = 'block';
  renderEdit();
}

function backToList() {
  document.getElementById('editView').style.display = 'none';
  document.getElementById('listView').style.display = 'block';
  renderList();
}

function renderEdit() {
  const it = items[idx];
  document.getElementById('img').src = it.localImage ? '/' + it.localImage : '';
  document.getElementById('nameInput').value = it.name;
  document.getElementById('gradeInfo').textContent = it.grade + '-grade · ' + it.category + ' · ' + (it.source === 'kr' ? 'Kakao/Global' : 'LINE');
  document.getElementById('krName').textContent = it.krName;
  document.getElementById('krBlock').style.display = it.source === 'kr' ? 'block' : 'none';
  document.getElementById('kr').textContent = it.krAbility || '(no ability text in source)';
  document.getElementById('effectInput').value = it.effect || '';
}

function moveWithinFiltered(dir) {
  const vis = filteredIndices();
  const pos = vis.indexOf(idx);
  const next = vis[(pos + dir + vis.length) % vis.length];
  idx = next !== undefined ? next : idx;
  renderEdit();
}

async function save() {
  const it = items[idx];
  const name = document.getElementById('nameInput').value.trim();
  const effect = document.getElementById('effectInput').value.trim();
  const statusEl = document.getElementById('status');
  statusEl.className = '';
  statusEl.textContent = 'Saving (commits to GitHub, redeploy takes ~30-60s)...';
  const body = it.source === 'kr'
    ? { password, source: 'kr', id: it.id, englishName: name, abilityEn: effect }
    : { password, source: 'line', originalName: it.originalName, name, effect };
  const res = await fetch('/api/admin/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (res.ok) {
    it.name = name;
    it.effect = effect;
    if (it.source === 'line') it.originalName = name;
    statusEl.textContent = 'Saved';
    setTimeout(() => statusEl.textContent = '', 2000);
  } else {
    const data = await res.json().catch(() => ({}));
    statusEl.className = 'error';
    statusEl.textContent = 'Error: ' + (data.error || res.status);
    if (res.status === 401) {
      localStorage.removeItem('adminPassword');
    }
  }
}

document.getElementById('search').oninput = renderList;
document.getElementById('onlyUntranslated').onchange = renderList;
document.getElementById('sourceFilter').onchange = renderList;
document.getElementById('backToList').onclick = backToList;
document.getElementById('prev').onclick = () => moveWithinFiltered(-1);
document.getElementById('skip').onclick = () => moveWithinFiltered(1);
document.getElementById('save').onclick = save;
document.getElementById('saveNext').onclick = async () => { await save(); moveWithinFiltered(1); };
</script>
</body>
</html>
